# Bypath Configuration

server:
  api_port: 8080
  dns_port: 53
  socks_port: 2801        # SOCKS5/HTTP mixed proxy port (configurable)
  api_token: ""           # Set a token to require authentication for API (e.g. "my-secret-token")

# Gateway mode — clients set DNS/GW to this machine
gateway:
  enabled: true
  native_tun: true        # use sing-box native TUN inbound (no tun2socks/dns2socks)
  interface: ""           # auto-detect
  dns_upstream:
    - "1.1.1.1"
    - "8.8.8.8"

# Engine settings
engines:
  directory: "./engines"
  prefer_system: true
  preferred: ""           # "sing-box" or "xray" (empty = auto-detect based on protocol)

  # Automatic engine fallback — if the preferred engine fails, try the next one.
  # Set enabled: false to disable fallback and fail hard if the primary engine doesn't start.
  fallback:
    enabled: true
    timeout: "10s"        # per-engine startup timeout
    order:
      - sing-box
      - xray

# Rule-based routing — map traffic matchers to named outbounds.
# Matchers: geoip:<cc>, geosite:<tag>, domain:<exact>, domain_suffix:<suffix>, ip_cidr:<cidr>, default
# Outbounds: direct, proxy, or any name defined in external_outbounds below.
# Rules are evaluated in order; private IPs always go direct regardless.
routing:
  rules:
    - match: domain_suffix:cloudflare.com
      outbound: direct
    - match: domain_suffix:ip-api.com
      outbound: direct
    - match: geoip:ir
      outbound: direct
    - match: geosite:ir
      outbound: direct
    - match: default
      outbound: proxy

  # External proxy servers not managed by bypath profiles.
  # Format: <name>: <url>   (supported schemes: socks5, socks4, http, https)
  # external_outbounds:
  #   lray-proxy: socks5://172.20.100.12:8088

# Legacy whitelist config (deprecated — use routing.rules above instead)
# whitelist:
#   countries: ["ir"]
#   bypass_domains:
#     - "ir"
#     - "cloudflare.com"
#   update_interval: "24h"

# Network namespace isolation for tunnel processes
isolation:
  enabled: true

# SNI Spoofing — replace real SNI with a fake one to bypass DPI
sni_spoof:
  enabled: false
  sni: "digikala.com"     # Fake SNI (Iranian domain to look like local traffic)

# Tunnel chain — how traffic flows
# A chain defines an ordered sequence of proxy hops.
# Traffic flows: client → hop1 → hop2 → ... → internet
#
# Multi-hop example (uncomment and adjust):
#   - name: "multi-hop"
#     hops:
#       - profile: "iran-relay"
#         engine: "sing-box"    # optional: force engine (empty = auto-detect)
#       - profile: "germany-exit"
#     auto_start: false         # start this chain automatically on gateway startup

chains:
  - name: "default"
    hops:
      - profile: "my-server"
        engine: ""       # empty = auto-detect based on protocol
