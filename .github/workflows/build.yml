name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  BINARY_NAME: bypath

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go vet
        run: go vet ./...

  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: [test, lint]
    strategy:
      matrix:
        include:
          # Lite builds
          - { os: linux, arch: amd64, variant: lite, tags: '' }
          - { os: linux, arch: arm64, variant: lite, tags: '' }
          - { os: linux, arch: arm, variant: lite, tags: '', goarm: '7' }
          - { os: linux, arch: mipsle, variant: lite, tags: '', gomips: 'softfloat' }
          - { os: windows, arch: amd64, variant: lite, tags: '' }
          - { os: darwin, arch: amd64, variant: lite, tags: '' }
          - { os: darwin, arch: arm64, variant: lite, tags: '' }
          # Full builds
          - { os: linux, arch: amd64, variant: full, tags: 'full' }
          - { os: linux, arch: arm64, variant: full, tags: 'full' }
          - { os: linux, arch: arm, variant: full, tags: 'full', goarm: '7' }
          - { os: windows, arch: amd64, variant: full, tags: 'full' }
          - { os: darwin, arch: amd64, variant: full, tags: 'full' }
          - { os: darwin, arch: arm64, variant: full, tags: 'full' }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=2.1.0-dev.$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: '0'
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi

          FILENAME="${{ env.BINARY_NAME }}-${{ matrix.variant }}-${{ matrix.os }}-${{ matrix.arch }}${EXT}"

          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X github.com/liberoute/bypath/internal/build.Version=${{ steps.version.outputs.version }}"
          LDFLAGS="$LDFLAGS -X github.com/liberoute/bypath/internal/build.Commit=${{ github.sha }}"
          LDFLAGS="$LDFLAGS -X github.com/liberoute/bypath/internal/build.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          TAGS=""
          if [ -n "${{ matrix.tags }}" ]; then TAGS="-tags ${{ matrix.tags }}"; fi

          go build $TAGS -ldflags "$LDFLAGS" -o "dist/${FILENAME}" ./cmd/bypath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.variant }}-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/

  integration:
    name: Integration Test (Docker)
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f test/integration/Dockerfile.test -t bypath-test .

      - name: Run integration tests
        run: docker run --rm bypath-test

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "name=Dev Build (latest)" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Delete existing dev release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release delete "${{ steps.tag.outputs.tag }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
