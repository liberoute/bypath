version: "3.8"

services:
  liberoute:
    build: .
    container_name: bypath
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host          # Required for gateway mode (routing LAN traffic)
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
      - ./engines:/app/engines
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Tehran
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/status"]
      interval: 30s
      timeout: 5s
      retries: 3
