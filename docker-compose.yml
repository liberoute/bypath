services:
  bypath:
    build:
      context: .
      args:
        VARIANT: lite
        VERSION: "2.1.0"
    container_name: bypath
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
      - ./engines:/app/engines
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Tehran
    sysctls:
      - net.ipv4.ip_forward=1
